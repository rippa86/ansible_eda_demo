- name: Schedule approved ServiceNow changes on AAP
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: ServiceNow change scheduled and authorized
      condition: >-
        event.payload.event_type == "CHANGE_SCHEDULED"
        and event.payload.change_details.state == "Scheduled"
        and event.payload.change_details.approval == "Approved"
      action:
        run_workflow_template:
          organization: "Default"
          name: "Schedule-CHG-Automation"
          job_args:
            extra_vars:
              eda_event_type: "{{ event.payload.event_type }}"
              eda_change_details: "{{ event.payload.change_details }}"
              aap_schedule_timezone: "{{ schedule_timezone | default('UTC') }}"
              controller_organization: "{{ controller_organization | default('Default') }}"
